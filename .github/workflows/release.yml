name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version (z. B. 0.1.1)'
        required: true
        default: '0.1.0'

jobs:
  release:
    name: Audiola bauen, Velopack-Installer + Release veröffentlichen
    runs-on: windows-2025
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write   # für das Erstellen des GitHub-Releases

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # Velopack baut Delta-Pakete aus der Release-Historie

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 9.0.x

      - name: Version ableiten
        id: ver
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/v}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            v="${{ github.event.inputs.version }}"
          else
            v="0.1.0"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore src/Audiola/Audiola.csproj

      - name: Audiola veröffentlichen (Windows-Desktop-App)
        shell: pwsh
        run: |
          # Velopack braucht einen einfachen Publish-Ordner (kein SingleFile), um das Update-Paket zu bauen.
          dotnet publish src/Audiola/Audiola.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=false `
            -p:Version=${{ steps.ver.outputs.version }} `
            -o publish/app

      - name: Velopack-CLI (vpk) installieren
        run: dotnet tool install --global vpk

      - name: Mit Velopack packen (Installer + Update-Paket)
        shell: pwsh
        run: |
          vpk pack `
            --packId Audiola `
            --packTitle "Audiola" `
            --packAuthors "Florian Gilde" `
            --packVersion ${{ steps.ver.outputs.version }} `
            --packDir publish/app `
            --mainExe Audiola.exe `
            --icon src/Audiola/Assets/audiola.ico `
            --outputDir releases

      - name: GitHub-Release erstellen
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Audiola ${{ steps.ver.outputs.version }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # Setup.exe = Installer-Download; releases.win.json + assets.win.json + RELEASES
          # werden vom In-App-UpdateManager gelesen, um neue Versionen zu finden.
          files: |
            releases/*
